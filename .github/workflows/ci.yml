name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.check.outputs.src }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "src=true" >> $GITHUB_OUTPUT
          elif git diff --name-only "$BASE_SHA" HEAD | grep -qvE '^(docs/|[^/]*\.md$|LICENSE$)'; then
            echo "src=true" >> $GITHUB_OUTPUT
          else
            echo "src=false" >> $GITHUB_OUTPUT
          fi

  lint:
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jobapi
          POSTGRES_PASSWORD: jobapi
          POSTGRES_DB: jobapi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Run migrations
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.1
          migrate -path ./migrations -database "postgres://jobapi:jobapi@localhost:5432/jobapi?sslmode=disable" up

      - name: Unit tests
        run: go test -v -race -count=1 ./...

      - name: Integration tests
        run: go test -v -race -count=1 -tags=integration ./...
        env:
          DATABASE_URL: postgres://jobapi:jobapi@localhost:5432/jobapi?sslmode=disable

  build:
    runs-on: ubuntu-latest
    needs: [changes, lint, test]
    if: needs.changes.outputs.src == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker image
        run: docker build -t async-data-job-api .

  ci-gate:
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    steps:
      - name: Verify CI result
        env:
          LINT: ${{ needs.lint.result }}
          TEST: ${{ needs.test.result }}
          BUILD: ${{ needs.build.result }}
        run: |
          # ドキュメントのみの変更: 全ジョブが skipped → 通過
          if [[ "$LINT" == "skipped" && "$TEST" == "skipped" && "$BUILD" == "skipped" ]]; then
            echo "Docs-only change: gate passed"
            exit 0
          fi
          # ソース変更: build まで通過していれば OK
          if [[ "$BUILD" == "success" ]]; then
            echo "All checks passed: gate passed"
            exit 0
          fi
          echo "CI gate failed (lint=$LINT, test=$TEST, build=$BUILD)"
          exit 1
